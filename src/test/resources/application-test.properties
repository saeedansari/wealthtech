spring.application.name=WealthTech-Test

# Ollama config (base-url overridden by testcontainer, summarization mocked by TestSummarizationService)
ollama.base-url=http://localhost:11434
ollama.embedding-model=nomic-embed-text
ollama.llm-model=tinyllama

# Search
search.default-limit=20
search.minimum-score=0.35

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# API Authentication
api.key=test-api-key
