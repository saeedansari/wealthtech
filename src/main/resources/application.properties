spring.application.name=WealthTech

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wealthtech?stringtype=unspecified}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:wealthtech}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:wealthtech}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.fly
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Ollama
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.embedding-model=nomic-embed-text
ollama.llm-model=tinyllama

# Search defaults
search.default-limit=5
search.minimum-score=0.60

# API Authentication
api.key=${API_KEY:}

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
